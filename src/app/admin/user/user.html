<h1 class="h3 mb-2 text-gray-800">使用者管理</h1>

<div class="form-group d-flex align-items-center">
    <label class="control-label mb-0 mr-1">選擇角色</label>
    <select [(ngModel)]="selectRole" (change)="filterByRole()" class="form-control w-auto">
        @for (option of selectRoleOptions; track $index) {
            <option [value]="option.value">{{option.text}}</option>
        }
    </select>
</div>
<div class="card shadow mb-4">
    <div class="card-body">
        <div class="table-responsive">
            <table #table class="table table-hover table-bordered" width="100%" cellspacing="0">
            </table>
        </div>
    </div>
</div>
