<div id="login-wrapper" class="bg-gradient-primary">
    <div class="container ">

        <!-- Outer Row -->
        <div class="row justify-content-center">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <div class="col-lg-6  d-lg-block ">
                                <div class="bg-login-image"></div>
                            </div>
                            <div class="col-lg-6">
                                <div id="form_container" class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">WMS登入</h1>
                                    </div>

                                    <form id="form" method="post" class="user" >

                                        <div class="form-group">
                                            <input [(ngModel)]="Account" name="Account"
                                                class="form-control form-control-user"
                                                aria-required="true" autocomplete="off" placeholder="帳號">
                                            <span class="text-danger"></span>
                                        </div>
                                        <div class="form-group">
                                            <input [(ngModel)]="Password" name="Password"
                                                type = "password"
                                                class="form-control form-control-user" aria-required="true"
                                                autocomplete="off" placeholder="密碼">
                                            <span class="text-danger"></span>
                                        </div>


                                        <div class="form-group">
                                            <style>

                                            </style>
                                            <div class="custom-control custom-checkbox small">
                                                <input [(ngModel)]="RememberMe" name="RememberMe" id="RememberMe"
                                                (change)="rememberMe()"
                                                 type="checkbox" 
                                                 class="custom-control-input"   role="button">
                                                <label class="custom-control-label" for="RememberMe"  role="button">
                                                    記住我
                                                </label>
                                            </div>
                                        </div>

                                        <button id="login-submit" 
                                            type="button"
                                            (click)="login()"
                                            class="btn btn-primary btn-user btn-block">登入</button>

                                    </form>


                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>
