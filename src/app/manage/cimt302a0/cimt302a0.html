<!-- form -->
<div class="mb-2">
    <div class="form">
        <div class="form-group">
            <button (click)="this.A01Modal.show()" type="button" class="btn btn-primary">掃描單號</button>
            <label class="control-label">單號:</label>
            <span>{{inputA01}}</span>

            <div style="margin-left:auto">
                <span>{{scanned_count}}</span>
                <span>/</span>
                <span>{{rows_count}}</span>
            </div>
        </div>
        <div class="form-group">
            <button (click)="this.A02Modal.show()" type="button" class="btn btn-primary">掃描載體</button>
            <label class="control-label">載體:</label>
            <span>{{inputA02}}</span>
        </div>
    </div>
</div>

<!-- btns-->
<div style="text-align:center;position: relative;" class="mb-3">
    @if (!scan_completed){
        <button (click)="this.scanModal.show()" type="button" class="btn btn-primary btn-lg">開始掃描</button>
    } @else {
        <button (click)="submit()" type="button" class="btn btn-success btn-lg">確認點收</button>
    }
</div>

<!-- table -->
<div class="card shadow mb-4">

        <div style="margin-left:auto">

    <div class="card-body" style="padding-top:0;">
        <div class="table-responsive">
            <table #table class="table table-click-scanned table-bordered" width="100%" cellspacing="0">
            </table>
        </div>
    </div>
</div>

<app-scan-modal #A01Modal [title]="'掃描單號'" [value]="'202512170001'" (onConfirm)="A01ModalConfirm($event)"></app-scan-modal>
<app-scan-modal #A02Modal [title]="'掃描載體'" [value]="''" (onConfirm)="A02ModalConfirm($event)"></app-scan-modal>
<app-scan-modal #scanModal [title]="'開始掃描'" [placeholder]="'製造批號或布疋號'" (onConfirm)="scanModalConfirm($event)"></app-scan-modal>
