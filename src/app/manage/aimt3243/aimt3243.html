<!-- form -->
<div class="mb-2">
    <div class="form">
        <div class="form-group">
            <button (click)="A01ModalShow()" type="button" class="btn btn-primary">掃描載體</button>
            <label class="control-label">來源載體:</label>
            <span>{{inputA01}}</span>

            <div style="margin-left:auto">
                <span>{{scanned_count}}</span>
                <span>/</span>
                <span>{{rows_count}}</span>
            </div>
        </div>
        <div class="form-group">
            <button type="button" class="btn btn-primary invisible"></button>
            <label class="control-label">目前儲位:</label>
            <span>{{current_ime02}}</span>
        </div>
        <div class="form-group">
            <button (click)="A02ModalShow()" type="button" class="btn btn-primary">掃描儲位</button>
            <label class="control-label">變更儲位:</label>
            <span>{{inputA02}}</span>
        </div>
    </div>
</div>

<!-- btns-->
<div style="text-align:center;position: relative;" class="mb-3">
    <button (click)="submit()" type="button" class="btn btn-success btn-lg" [class.invisible]="!inputA02|| !inputA02">確認綁定</button>
</div>

<!-- table -->
<div class="card shadow mb-4">

        <div style="margin-left:auto">

            <button type="button"></button>
        </div>
    </div> -->
    <div class="card-body" style="padding-top:0;">
        <div class="table-responsive">
            <table #table class="table table-bordered" width="100%" cellspacing="0">
            </table>
        </div>
    </div>
</div>

<app-scan-modal #A01Modal [title]="'掃描載體'" (onConfirm)="A01ModalConfirm($event)"></app-scan-modal>
<app-scan-modal #A02Modal [title]="'掃描儲位'" (onConfirm)="A02ModalConfirm($event)"></app-scan-modal>
